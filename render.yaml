services:
  - type: web
    name: apoia-simulator
    runtime: node
    buildCommand: npm install && cd web/client && npm install && cd ../.. && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      # Optional: set server-side API keys
      # - key: OPENAI_API_KEY
      #   sync: false
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: GOOGLE_GENERATIVE_AI_API_KEY
      #   sync: false
